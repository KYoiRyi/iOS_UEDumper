name: Build iOS Tweak

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y fakeroot perl curl git lzma xz-utils bzip2 dpkg-dev rsync libxml2-utils

      - name: Install Theos
        run: |
          git clone --recursive https://github.com/theos/theos.git $HOME/theos
          echo "THEOS=$HOME/theos" >> $GITHUB_ENV

      - name: Install iOS toolchain
        run: |
          curl -sL https://github.com/L1ghtmann/llvm-project/releases/latest/download/iOSToolchain-x86_64.tar.xz | tar -xJvf - -C $THEOS/toolchain/
          ls $THEOS/toolchain/linux/iphone/bin/

      - name: Install iOS SDK
        run: |
          rm -rf $THEOS/sdks
          git clone https://github.com/theos/sdks.git $THEOS/sdks
          ls $THEOS/sdks/

      - name: Build tweak
        working-directory: Tweak
        run: |
          make clean package THEOS=$THEOS ARCHS=arm64e

      - name: Upload dylib
        uses: actions/upload-artifact@v4
        with:
          name: UEDumper-arm64e-dylib
          path: Tweak/.theos/obj/arm64e/UEDumper.dylib

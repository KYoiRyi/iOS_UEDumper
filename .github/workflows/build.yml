name: Build iOS Tweak

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y fakeroot perl curl git lzma xz-utils bzip2

      - name: Install Theos
        run: |
          git clone --recursive https://github.com/theos/theos.git $HOME/theos
          echo "THEOS=$HOME/theos" >> $GITHUB_ENV

      - name: Install iOS SDK
        run: |
          # Download and install iOS SDK for cross-compilation on Linux
          SDK_URL="https://github.com/xybpennings/iOS-SDKs/raw/master/iPhoneOS17.2.sdk.tar.xz"
          curl -L -o /tmp/sdk.tar.xz "$SDK_URL"
          mkdir -p $THEOS/sdks/iPhoneOS17.2.sdk
          tar -xf /tmp/sdk.tar.xz -C $THEOS/sdks/iPhoneOS17.2.sdk --strip-components=1
          ls $THEOS/sdks/

      - name: Build tweak
        working-directory: Tweak
        run: |
          make clean package THEOS=$THEOS

      - name: Upload built package
        uses: actions/upload-artifact@v4
        with:
          name: UEDumper-deb
          path: Tweak/packages/**/*.deb
          if-no-files-found: warn
